<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Login - ParallelogramDrive</title>

                        "on-secondary": "#002e6a",
                        "surface-dim": "#131313",
                        "primary": "#d2bbff",
                        "on-error-container": "#ffdad6",
                        "primary-container": "#7b2ff7",
                        "on-primary-fixed": "#25005a",
                        "on-secondary-fixed-variant": "#004395",

                }

<style>
        body {
            background-color: #050505;
            background-image: 
                linear-gradient(rgba(255, 255, 255, 0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255, 255, 255, 0.03) 1px, transparent 1px);
            background-size: 40px 40px;
        }
        .glass-panel {
            background: rgba(28, 27, 27, 0.6);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        .glow-active {
            box-shadow: 0 0 20px rgba(123, 47, 247, 0.2);
        }
        .input-glow:focus-within {
            border-bottom-color: #7b2ff7;
            box-shadow: 0 1px 10px rgba(123, 47, 247, 0.3);
        }
        .auth-card {
            box-shadow: 0 0 40px rgba(123, 47, 247, 0.1);
        }
    </style>
</head>
<body class="text-on-background min-h-screen flex items-center justify-center p-margin-mobile md:p-margin-desktop overflow-hidden relative">
<!-- Decorative floating elements -->
<div class="absolute top-1/4 left-1/4 w-64 h-64 bg-primary-container/10 rounded-full blur-[100px] -z-10"></div>
<div class="absolute bottom-1/4 right-1/4 w-96 h-96 bg-tertiary-container/10 rounded-full blur-[120px] -z-10"></div>
<main class="w-full max-w-[420px] relative z-10">
<!-- Auth Card -->
<div class="glass-panel auth-card rounded-xl p-8 flex flex-col gap-8 relative overflow-hidden transition-all duration-300 hover:shadow-[0_0_50px_rgba(123,47,247,0.15)]">
<!-- Graphic / Logo -->
<div class="flex justify-center mb-2">
<div class="w-16 h-16 bg-gradient-to-tr from-primary-container to-tertiary transform -skew-x-12 rounded-sm flex items-center justify-center shadow-[0_0_30px_rgba(123,47,247,0.4)] animate-[pulse_4s_ease-in-out_infinite]">
<span class="material-symbols-outlined text-on-primary text-3xl" style="font-variation-settings: 'FILL' 1;">hub</span>
</div>
</div>
<!-- Headers -->
<div class="text-center space-y-2">
<h1 class="font-headline-lg text-headline-lg md:text-headline-lg md:font-headline-lg text-on-surface tracking-tight">Authenticate</h1>
<p class="font-body-sm text-body-sm text-on-surface-variant">Secure access to ParallelogramDrive</p>
</div>
<!-- Login Actions -->
<div class="space-y-4">
<button class="w-full flex items-center justify-center gap-3 bg-primary-container text-on-primary-container py-3 px-4 rounded-lg font-body-sm text-body-sm font-semibold transition-all duration-300 hover:scale-[1.02] hover:shadow-[0_0_20px_rgba(123,47,247,0.4)]">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">send</span>
                    Login with Telegram
                </button>
<div class="relative flex items-center py-2">
<div class="flex-grow border-t border-outline/20"></div>
<span class="flex-shrink-0 mx-4 font-label-caps text-label-caps text-outline-variant">OR</span>
<div class="flex-grow border-t border-outline/20"></div>
</div>
<!-- Form -->
<form class="space-y-5">
<div class="space-y-1">
<label class="font-label-caps text-label-caps text-on-surface-variant block">Email Address</label>
<div class="relative input-glow border-b border-outline/30 transition-colors duration-300">
<span class="absolute left-0 top-1/2 -translate-y-1/2 material-symbols-outlined text-outline text-sm">mail</span>
<input class="w-full bg-transparent border-none focus:ring-0 text-on-surface font-body-sm text-body-sm pl-8 py-2 placeholder-outline-variant" placeholder="node@network.com" type="email"/>
</div>
</div>
<div class="space-y-1">
<div class="flex justify-between items-center">
<label class="font-label-caps text-label-caps text-on-surface-variant block">Password</label>
<a class="font-label-caps text-label-caps text-primary hover:text-tertiary transition-colors" href="#">Forgot?</a>
</div>
<div class="relative input-glow border-b border-outline/30 transition-colors duration-300">
<span class="absolute left-0 top-1/2 -translate-y-1/2 material-symbols-outlined text-outline text-sm">lock</span>
<input class="w-full bg-transparent border-none focus:ring-0 text-on-surface font-body-sm text-body-sm pl-8 py-2 placeholder-outline-variant" placeholder="••••••••" type="password"/>
</div>
</div>
<button class="w-full bg-surface-container-high border border-outline/10 text-on-surface py-3 px-4 rounded-lg font-body-sm text-body-sm font-semibold transition-all duration-300 hover:bg-surface-bright hover:scale-[1.02] mt-4" type="button">
                        Continue
                    </button>
</form>
</div>
<!-- Contextual Footer -->
<p class="text-center font-label-caps text-label-caps text-on-surface-variant mt-2">
                Distributed Infrastructure Secured by Protocol v1.0.4
            </p>
</div>
</main>
<script>
        // Simple script to add slight interactive glow to inputs on focus
        const inputs = document.querySelectorAll('input');
        inputs.forEach(input => {
            input.addEventListener('focus', () => {
                input.parentElement.classList.add('glow-active');
            });
            input.addEventListener('blur', () => {
                input.parentElement.classList.remove('glow-active');
            });
        });
    </script>
</body></html>
