<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none">
  <!-- White background circle -->
  <rect width="32" height="32" rx="7" fill="#ffffff"/>
  
  <!-- Outer parallelogram ring (neon green) -->
  <polygon
    points="16,2 28,9 16,16 4,9"
    fill="none"
    stroke="#39FF14"
    stroke-width="2"
    stroke-linejoin="round"
  />
  <!-- Left face -->
  <polygon
    points="4,9 16,16 16,30 4,23"
    fill="none"
    stroke="#39FF14"
    stroke-width="2"
    stroke-linejoin="round"
  />
  <!-- Right face (yellow accent) -->
  <polygon
    points="16,16 28,9 28,23 16,30"
    fill="none"
    stroke="#FFE600"
    stroke-width="2"
    stroke-linejoin="round"
  />
  
  <!-- Inner green dot -->
  <circle cx="16" cy="16" r="2.5" fill="#39FF14"/>
</svg>
